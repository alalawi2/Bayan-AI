<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a5f"/><stop offset="1" stop-color="#0b1c2d"/>
    </linearGradient>
    <linearGradient id="g4t" x1="160" y1="140" x2="360" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#99f6e4"/><stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="240" fill="url(#g4)"/>
  <!-- Pulse rings (healthcare + tech) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.1"/>
  <!-- Heartbeat/pulse line -->
  <polyline points="80,256 180,256 210,180 240,340 270,200 300,256 420,256" fill="none" stroke="#0d9488" stroke-width="4" opacity="0.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- B lettermark -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="200" fill="url(#g4t)">B</text>
  <!-- Accent dot -->
  <circle cx="380" cy="160" r="14" fill="#fbbf24"/>
</svg>
